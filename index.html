<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIMPANG DIGITAL KREATIF - Manajemen Aset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <header class="border-b pb-4 mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">RIMPANG DIGITAL KREATIF</h1>
            <div class="space-x-2">
                <button onclick="exportToExcel()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Ekspor Excel</button>
                <button onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Print</button>
            </div>
        </header>

        <!-- Form Input -->
        <form id="assetForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 bg-gray-50 p-4 rounded-lg">
            <input type="text" id="name" placeholder="Nama Aset" class="p-2 border rounded" required>
            <input type="number" id="qty" placeholder="Jumlah" class="p-2 border rounded" required>
            <input type="number" id="price" placeholder="Harga Satuan" class="p-2 border rounded" required>
            <input type="file" id="image" accept="image/*" class="p-2 border rounded bg-white">
            <button type="submit" class="md:col-span-4 bg-gray-800 text-white p-2 rounded hover:bg-black">Tambah Aset</button>
        </form>

        <!-- Tabel Aset -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse" id="assetTable">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="p-3">Gambar</th>
                        <th class="p-3">Nama Aset</th>
                        <th class="p-3">Qty</th>
                        <th class="p-3">Harga</th>
                        <th class="p-3">Total</th>
                        <th class="p-3">Aksi</th>
                    </tr>
                </thead>
                <tbody id="assetBody"></tbody>
                <tfoot>
                    <tr class="bg-gray-100 font-bold">
                        <td colspan="4" class="p-3 text-right">TOTAL KESELURUHAN:</td>
                        <td id="grandTotal" class="p-3" colspan="2">Rp 0</td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <script>
        let assets = JSON.parse(localStorage.getItem('rimpang_assets')) || [];

        function renderAssets() {
            const body = document.getElementById('assetBody');
            const grandTotalEl = document.getElementById('grandTotal');
            body.innerHTML = '';
            
            let grandTotal = 0;
            assets.forEach((item, index) => {
                const totalItem = item.qty * item.price;
                grandTotal += totalItem;
                
                body.innerHTML += `
                    <tr class="border-b">
                        <td class="p-3"><img src="${item.image}" class="w-16 h-16 object-cover rounded"></td>
                        <td class="p-3">${item.name}</td>
                        <td class="p-3">${item.qty}</td>
                        <td class="p-3">Rp ${parseInt(item.price).toLocaleString()}</td>
                        <td class="p-3">Rp ${totalItem.toLocaleString()}</td>
                        <td class="p-3">
                            <button onclick="deleteAsset(${index})" class="text-red-500 hover:underline">Hapus</button>
                        </td>
                    </tr>
                `;
            });
            
            grandTotalEl.innerText = `Rp ${grandTotal.toLocaleString()}`;
            localStorage.setItem('rimpang_assets', JSON.stringify(assets));
        }

        document.getElementById('assetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const file = document.getElementById('image').files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                assets.push({
                    name: document.getElementById('name').value,
                    qty: document.getElementById('qty').value,
                    price: document.getElementById('price').value,
                    image: event.target.result
                });
                renderAssets();
                document.getElementById('assetForm').reset();
            };
            
            if(file) {
                reader.readAsDataURL(file);
            } else {
                alert("Mohon pilih gambar aset.");
            }
        });

        function deleteAsset(index) {
            assets.splice(index, 1);
            renderAssets();
        }

        function exportToExcel() {
            const wb = XLSX.utils.table_to_book(document.getElementById('assetTable'));
            XLSX.writeFile(wb, "Data_Aset_RIMPANG.xlsx");
        }

        renderAssets();
    </script>
</body>
</html>
